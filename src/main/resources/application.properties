# ==========================================
# Spring Boot - Library Management System
# ==========================================

# Server port cho REST API
server.port=8080

# PostgreSQL DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/LibraryData
spring.datasource.username=postgres
spring.datasource.password=1
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Tắt Spring Boot banner cho gọn terminal
spring.main.banner-mode=off

# Chỉ log lỗi, không log INFO thừa
logging.level.root=WARN
logging.level.com.librarymanagement=INFO
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
